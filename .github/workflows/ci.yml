name: Build and Push Docker Image

on:
  push:
    # main 또는 master 브랜치에 코드가 push될 때만 파이프라인 트리거
    branches:
      - main
      - master

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 저장소의 코드를 가상 머신(Runner)으로 가져오기
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Docker 빌드를 위한 Buildx 설정 (캐싱 등 고급 빌드 기능 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (GitHub Secrets 정보 활용)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 빌드 및 Docker Hub로 Push (Buildx 캐시 적용)
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # DOCKERHUB_USERNAME/repo-name:latest 형태로 태깅
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pixel-art-api:latest
          # 빌드 시간 단축을 위한 Docker 레이어 캐싱 설정
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pixel-art-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pixel-art-api:buildcache,mode=max
